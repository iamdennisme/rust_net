name: Tag Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-and-publish:
    runs-on: macos-14
    env:
      PUB_HOSTED_URL: https://pub.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,
            x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/rust_net/native/rust_net_native

      - name: Install build tooling
        run: |
          set -euo pipefail
          brew install zig
          cargo install cargo-zigbuild --locked

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          sdkmanager --install 'ndk;27.0.12077973'

      - name: Validate tag/version consistency
        run: |
          set -euo pipefail
          core_version="$(awk '/^version:/{print $2; exit}' packages/rust_net_core/pubspec.yaml)"
          rust_net_version="$(awk '/^version:/{print $2; exit}' packages/rust_net/pubspec.yaml)"
          if [[ "${core_version}" != "${rust_net_version}" ]]; then
            echo "::error::Version mismatch: rust_net_core=${core_version}, rust_net=${rust_net_version}"
            exit 1
          fi

          normalized_tag="${GITHUB_REF_NAME#v}"
          if [[ "${normalized_tag}" != "${rust_net_version}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${rust_net_version}."
            exit 1
          fi

      - name: Build all native artifacts
        run: ./scripts/build_native_all.sh release

      - name: Package release assets
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist

          zip -r "dist/rust_net_android_jniLibs_${tag}.zip" \
            packages/rust_net/android/src/main/jniLibs
          zip -r "dist/rust_net_ios_frameworks_${tag}.zip" \
            packages/rust_net/ios/Frameworks
          zip -r "dist/rust_net_macos_library_${tag}.zip" \
            packages/rust_net/macos/Libraries
          zip -r "dist/rust_net_linux_library_${tag}.zip" \
            packages/rust_net/linux/Libraries
          zip -r "dist/rust_net_windows_library_${tag}.zip" \
            packages/rust_net/windows/Libraries

          shasum -a 256 dist/* > "dist/SHA256SUMS_${tag}.txt"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
          fail_on_unmatched_files: true

      - name: Verify pub token secret
        env:
          PUB_DEV_PUBLISH_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_TOKEN }}
        run: |
          if [[ -z "${PUB_DEV_PUBLISH_TOKEN}" ]]; then
            echo "::error::Missing repository secret: PUB_DEV_PUBLISH_TOKEN"
            exit 1
          fi

      - name: Configure pub.dev token
        env:
          PUB_DEV_PUBLISH_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_TOKEN }}
        run: dart pub token add https://pub.dev --env-var PUB_DEV_PUBLISH_TOKEN

      - name: Dry run rust_net_core publish check
        run: |
          set -euo pipefail
          (cd packages/rust_net_core && dart pub publish --dry-run)

      - name: Publish rust_net_core
        run: |
          set -euo pipefail
          (cd packages/rust_net_core && dart pub publish --force)

      - name: Wait until rust_net_core is visible on pub.dev
        run: |
          set -euo pipefail
          core_version="$(awk '/^version:/{print $2; exit}' packages/rust_net_core/pubspec.yaml)"
          for attempt in {1..30}; do
            if dart pub cache add rust_net_core --version "${core_version}" >/dev/null 2>&1; then
              echo "rust_net_core ${core_version} is now available."
              exit 0
            fi
            echo "Waiting for rust_net_core ${core_version} to propagate (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "::error::rust_net_core ${core_version} was not visible on pub.dev in time."
          exit 1

      - name: Dry run rust_net publish check
        run: |
          set -euo pipefail
          (cd packages/rust_net && dart pub publish --dry-run)

      - name: Publish rust_net
        run: |
          set -euo pipefail
          (cd packages/rust_net && dart pub publish --force)
