name: rust_net_workspace

packages:
  - packages/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: dart run melos exec -c 1 --fail-fast -- "if grep -q '^flutter:' pubspec.yaml; then flutter analyze; else dart analyze; fi"
  test:
    run: dart run melos exec -c 1 --fail-fast -- "if [ -d test ]; then if grep -q '^flutter:' pubspec.yaml; then flutter test; else dart test; fi; else echo 'No tests found. Skipping.'; fi"
