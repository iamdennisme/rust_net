name: rust_net
description: "A standard HTTP SDK for Flutter backed by a Rust reqwest core."
version: 0.0.1
homepage: https://example.com/rust_net

environment:
  sdk: ^3.6.2
  flutter: ">=3.3.0"

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.14
  ffigen: ^13.0.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  json_serializable: ^6.9.3

flutter:
  plugin:
    platforms:
      macos:
        ffiPlugin: true
